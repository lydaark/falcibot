<!DOCTYPE html>
<html lang="tr">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot AI</title>

<style>

body{
background: radial-gradient(circle at top,#0a0a0a,#000);
font-family:Georgia;
color:#e6c56f;
text-align:center;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:#0f0f0f;
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,215,0,0.4);
}

h2{
letter-spacing:2px;
}

input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:#1a1a1a;
color:white;
}

button{
margin-top:20px;
padding:12px 25px;
background:linear-gradient(45deg,#caa74a,#ffd700);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

.card{
width:90px;
height:140px;
border-radius:12px;
background:linear-gradient(145deg,#111,#1c1c1c);
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
transition:0.4s;
box-shadow:0 0 15px rgba(255,215,0,0.2);
}

.card:hover{
transform:scale(1.1);
}

.open{
background:#ffd700;
color:black;
}

.yorum{
margin-top:30px;
text-align:left;
line-height:1.6;
white-space:pre-line;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>🔮 Tarot AI</h2>

<p>3 kart seç ve kaderini öğren</p>

<input id="question" placeholder="Sorunu yaz...">

<div class="cards" id="cards"></div>

<button onclick="falBak()">Fal Bak</button>

{% if yorum %}
<div id="yorum">{{ yorum }}</div>
{% endif %}

 
</div>

<script>

const tarot=[
"The Fool","The Magician","The High Priestess","The Empress",
"The Emperor","The Lovers","The Chariot","Strength","The Hermit",
"Wheel of Fortune","Justice","The Hanged Man","Death",
"Temperance","The Devil","The Tower","The Star","The Moon",
"The Sun","Judgement","The World"
]

const cardsDiv=document.getElementById("cards")
let selected=[]

window.onload=function(){

tarot.forEach(card=>{

let div=document.createElement("div")
div.className="card"
div.innerHTML="🃏"

div.onclick=()=>{

if(selected.length<3 && !selected.includes(card)){

selected.push(card)
div.classList.add("open")

}

}

cardsDiv.appendChild(div)

})

}

function falBak(){

let question=document.getElementById("question").value

if(selected.length<3){
alert("Lütfen 3 kart seç")
return
}

fetch("/",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"question="+question+"&cards="+selected.join(",")
})
.then(res=>res.text())
.then(data=>{
document.getElementById("yorum").innerHTML=data
})

}

</script>

</body>
</html>
