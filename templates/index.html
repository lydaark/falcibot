<!DOCTYPE html>
<html>
<head>

<title>Tarot AI</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
color:#ffd700;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px gold;
width:420px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
margin-top:15px;
padding:10px 20px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
}

.cards{
margin-top:20px;
}

.card{
background:#222;
padding:10px;
margin:5px;
border-radius:10px;
}

.yorum{
margin-top:20px;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h1>🔮 Tarot AI</h1>

<form method="POST">

<input name="question" placeholder="Sorunu yaz..." required>

<br>

<button>Fal Bak</button>

</form>


{% if cards %}

<div class="cards">

<h3>Seçilen Kartlar</h3>

{% for card in cards %}

<div class="card">

{{card}}

</div>

{% endfor %}

</div>

{% endif %}


{% if yorum %}

<div class="yorum">

<h3>Fal Yorumu</h3>

<p>{{yorum}}</p>

</div>

{% endif %}

</div>

</body>

</html>
