<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Falci Bot</title>

    <style>
        body {
            background: radial-gradient(circle, #0f0c29, #302b63, #24243e);
            color: gold;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            border-radius: 20px;
            border: none;
            background: gold;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        #sonuc {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>🔮 Falci Bot</h1>

    <input id="soru" placeholder="Sorunu yaz...">
    <br>
    <button onclick="falaBak()">Falına Bak</button>

    <p id="sonuc"></p>

<script>
function falaBak() {
    let soru = document.getElementById("soru").value;
    let sonuc = document.getElementById("sonuc");

    sonuc.innerText = "🔮 Bakılıyor...";

    fetch("/fal", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ soru: soru })
    })
    .then(res => res.json())
    .then(data => {
        sonuc.innerText = data.cevap;
    })
    .catch(err => {
        sonuc.innerText = "Hata oluştu...";
        console.log(err);
    });
}
</script>

</body>
</html>
