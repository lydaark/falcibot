<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Falci Bot</title>
<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}
input {
    padding: 10px;
    width: 250px;
    border-radius: 10px;
    border: none;
}
button {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: pink;
    cursor: pointer;
}
#sonuc {
    margin-top: 20px;
    font-style: italic;
}
</style>
</head>

<body>

<h1>🔮 Falci Bot</h1>

<input id="soru" placeholder="Sorunu yaz..." />
<br>
<button onclick="falBak()">Falına Bak</button>

<p id="sonuc"></p>

<script>
function falBak() {
    let soru = document.getElementById("soru").value;

    fetch("/fal", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ soru: soru })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("sonuc").innerText = data.cevap;
    });
}
</script>

</body>
</html>
