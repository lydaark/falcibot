<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Falcı AI</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0a0a0a;
font-family:'Cinzel', serif;
color:#d4af37;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(212,175,55,0.2);
width:420px;
}

h1{
font-size:42px;
margin-bottom:10px;
letter-spacing:2px;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-bottom:20px;
font-size:16px;
background:#111;
color:white;
}

button{
background:linear-gradient(45deg,#d4af37,#f5d97b);
border:none;
padding:15px 30px;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #d4af37;
}

.result{
margin-top:30px;
font-size:18px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h1>🔮 Falcı</h1>
<div class="subtitle">Geleceğini öğrenmek için sorunu yaz</div>

<form method="POST">

<input 
type="text"
name="question"
placeholder="Aşk hayatım nasıl olacak?"
required
>

<button type="submit">Fal Bak</button>

</form>

{% if answer %}
<div class="result">
✨ {{answer}}
</div>
{% endif %}

</div>

</body>
</html>
