<!DOCTYPE html>
<html>
<head>
    <title>Falci Bot</title>
    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            width: 250px;
            border-radius: 10px;
            border: none;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: pink;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>🔮 Falcı Bot</h1>

    <input id="soru" placeholder="Sorunu yaz..." />
    <br>
    <button onclick="falBak()">Falına Bak</button>

    <h3 id="sonuc"></h3>

    <script>
        function falBak() {
            let soru = document.getElementById("soru").value;

            fetch("/fal", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ soru: soru })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("sonuc").innerText = data.cevap;
            })
            .catch(err => {
                document.getElementById("sonuc").innerText = "Bir şeyler ters gitti...";
            });
        }
    </script>

</body>
</html>
