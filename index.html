<!DOCTYPE html>
<html>
<head>
<title>Falci Bot</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:#1e1e2f; color:white; padding-top:50px;">

<h1>🔮 Falcı Bot</h1>

<input id="soru" placeholder="Sorunu yaz..." 
style="padding:12px; border-radius:10px; border:none; width:200px;">

<br><br>

<button onclick="falBak()" 
style="padding:12px 20px; border:none; border-radius:20px; background:#ff4b8b; color:white; font-weight:bold;">
Falına Bak
</button>

<h2 id="sonuc" style="margin-top:30px;"></h2>

<script>
function falBak() {
let cevaplar = [
"✨ Güzel bir gelişme geliyor",
"💔 Biraz sabretmen gerek",
"🔥 Büyük bir fırsat kapıda",
"🌙 İç sesini dinlemelisin",
"💫 Aşk hayatında hareket var",
"⚡ Beklenmedik bir haber alacaksın"
];

let random = Math.floor(Math.random() * cevaplar.length);
document.getElementById("sonuc").innerText = cevaplar[random];
}
</script>

</body>
</html>
