<!DOCTYPE html>
<html>
<head>
    <title>Falci Bot</title>
    <style>
        body {
            background: linear-gradient(to right, #1e1e2f, #3a2b5c);
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: pink;
            cursor: pointer;
        }

        #sonuc {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>🔮 Falcı Bot</h1>

    <input id="soru" placeholder="Sorunu yaz..." />
    <br>
    <button onclick="falBak()">Falına Bak</button>

    <p id="sonuc"></p>

    <script>
        function falBak() {
            let soru = document.getElementById("soru").value;

            fetch("/fal", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ soru: soru })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("sonuc").innerText = data.cevap;
            });
        }
    </script>

</body>
</html>
