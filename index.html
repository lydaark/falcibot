<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Falci Bot</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    color: #d4af37;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(212,175,55,0.2);
    backdrop-filter: blur(10px);
}

h1 {
    font-size: 32px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

input {
    width: 260px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    background: #111;
    color: #d4af37;
    box-shadow: 0 0 10px rgba(212,175,55,0.2);
}

input::placeholder {
    color: #888;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(45deg, #d4af37, #b8962e);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(212,175,55,0.6);
}

#sonuc {
    margin-top: 20px;
    font-size: 18px;
    min-height: 30px;
    color: #fff;
}

.loading {
    opacity: 0.6;
    font-style: italic;
}
</style>

</head>

<body>

<div class="container">
    <h1>🔮 Falcı</h1>

    <input id="soru" placeholder="Kaderini sor...">

    <br>

    <button onclick="falaBak()">Fala Bak</button>

    <div id="sonuc"></div>
</div>

<script>
<script>
function falaBak() {
    let soru = document.getElementById("soru").value;
    let sonuc = document.getElementById("sonuc");

    if (!soru) {
        sonuc.innerText = "Bir soru sormalısın...";
        return;
    }

    sonuc.innerText = "Kehanet yazılıyor...";

    fetch("/fal", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ soru: soru })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Sunucu hatası");
        }
        return res.json();
    })
    .then(data => {
        sonuc.innerText = data.cevap || "Cevap alınamadı...";
    })
    .catch(err => {
        sonuc.innerText = "Kader sisli… tekrar dene.";
    });
}
</script>

</body>
</html>
